<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function cookieDemo() {
            if (!document.cookie) {
                alert("No existing cookies found.");
                document.cookie = "user=Pranjal";
            } else {
                alert(document.cookie);
            }
        }
        </script>
</head>
<body onload="cookieDemo()">
    <h1>Test</h1>
</body>
</html>
