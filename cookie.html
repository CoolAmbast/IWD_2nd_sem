<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function checkCookie() {
            var cdata = document.cookie;
            var d = new Date();
            d.setTime(d.getTime() + (7 * 24 * 60 * 60 * 1000));
            var expTime = "expires=" + d.toUTCString();

            if (cdata.length == 0) {
                alert("Welcome, You are first time visitor");
                document.cookie = "user=admin,pwd=demo,college=vvit;expTime";
            } 
            else {
                var eq, comma;
                eq = cdata.indexOf("=");       
                var rawdata = cdata.substr(eq + 1);
                comma = rawdata.indexOf(",");
                alert(eq + "," + comma);

                if (eq == -1) {
                    alert("Invalid Cookie format");
                    return;
                }
                var uname = rawdata.substr(0, comma);
                uname = uname.substr(uname.indexOf("=") + 1);
                var rest = rawdata.substr(comma + 1);
                var comma2 = rest.indexOf(",");
                var pwd = rest.substr(0, comma2);
                pwd = pwd.substr(pwd.indexOf("=") + 1);
                var college = rest.substr(comma2 + 1);
                college = college.substr(college.indexOf("=") + 1);

                alert("Welcome back, " + uname.toUpperCase() + 
                      "\nYour Password is: " + pwd + 
                      "\nCollege is: " + college.toUpperCase());
            }
        }
        </script>
</head>
<body onload="checkCookie()">
    <h1>Test</h1>
</body>
</html>
