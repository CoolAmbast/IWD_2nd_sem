<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="calculate.css">
    <script src="calculate2.js" defer></script>
</head>
<body>
    <div class="container">
        <h1 class="title text-center my-4">Calculator</h1>
        
        <div class="calculator-container mx-auto p-4">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="txtFN" class="form-label">Enter first number</label>
                </div>
                <div class="col-md-6">
                    <input type="text" id="txtFN" class="form-control">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="txtSN" class="form-label">Enter second number</label>
                </div>
                <div class="col-md-6">
                    <input type="text" id="txtSN" class="form-control">
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="txtRes" class="form-label">Result</label>
                </div>
                <div class="col-md-6">
                    <input type="text" id="txtRes" class="form-control" readonly>
                </div>
            </div>
            
            <div class="row">
                <div class="col">
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <button id="btnAdd" class="btn btn-success px-4">+</button>
                        <button id="btnSubtract" class="btn btn-danger px-4">-</button>
                        <button id="btnMultiply" class="btn btn-primary px-4">x</button>
                        <button id="btnDivide" class="btn btn-warning px-4">÷</button>
                        <button id="btnReset" class="btn btn-secondary px-4">Clear</button>
                    </div>
                </div>
            </div>
        </div>
        
        <p id="pmsg" class="message text-center text-danger mt-3"></p>
    </div>
</body>
</html>
